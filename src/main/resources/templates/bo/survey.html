<script>
    // ==================== API 설정 및 전역 변수 ====================
    const API_BASE_URL = '/v1';

    // 설문 상태 관리
    let currentSurveyId = null;           // 현재 편집 중인 설문 ID
    let isNewSurvey = true;               // 새 설문 여부
    let isSaving = false;                 // 저장 중 여부
    let questionIdMap = new Map();        // 프론트엔드 questionCounter → 백엔드 questionId 매핑
    let optionIdMap = new Map();          // 프론트엔드 옵션 → 백엔드 optionId 매핑

    // 문항 타입 표시용 텍스트 매핑
    const QUESTION_TYPE_LABEL = {
        'choice': '객관식',
        'text': '단답형',
        'textarea': '장문형',
        'rating': '평가형',
        'nps': 'NPS',
        'number': '숫자형',
        'date': '날짜형'
    };

    // 문항 타입 매핑 (프론트엔드 → 백엔드)
    const QUESTION_TYPE_MAP = {
        'choice': 'CHOICE',
        'text': 'SHORT',
        'textarea': 'LONG',
        'rating': 'RATING',
        'nps': 'NPS',
        'number': 'NUMBER',
        'date': 'DATE'
    };

    // 문항 타입 역매핑 (백엔드 → 프론트엔드)
    const QUESTION_TYPE_REVERSE_MAP = {
        'CHOICE': 'choice',
        'SHORT': 'text',
        'LONG': 'textarea',
        'RATING': 'rating',
        'NPS': 'nps',
        'NUMBER': 'number',
        'DATE': 'date'
    };

    // ==================== API 호출 함수 ====================

    // 공통 API 호출 함수
    async function apiCall(url, method = 'GET', data = null) {
        console.log("API CALL 발생");
        const options = {
            method,
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            credentials: 'include'  // 쿠키 포함 (인증용)
        };

        if (data && method !== 'GET') {
            options.body = JSON.stringify(data);
        }
        console.log("BODY: " + options.body);

        try {
            const response = await fetch(API_BASE_URL + url, options);

            // Content-Type 확인
            const contentType = response.headers.get('content-type');

            // HTML 응답인 경우 (로그인 페이지로 리다이렉트 등)
            if (contentType && contentType.includes('text/html')) {
                console.warn('API가 HTML을 반환했습니다. 인증이 필요할 수 있습니다.');
            }

            // 401 Unauthorized - 인증 필요
            if (response.code === 401) {
                showToast('로그인이 필요합니다.', 'error');
                // 로그인 페이지로 리다이렉트 (필요시)
                // window.location.href = '/login';
                return null;
            }

            // 403 Forbidden
            if (response.code === 403) {
                showToast('접근 권한이 없습니다.', 'error');
                return null;
            }

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.message || 'API 호출 실패');
            }

            return result.result;
        } catch (error) {
            console.error('API Error:', error);

            // JSON 파싱 에러인 경우
            if (error instanceof SyntaxError) {
                console.warn('JSON 파싱 실패 - 개발 모드로 전환');
            }

            showToast('오류가 발생했습니다: ' + error.message, 'error');
            throw error;
        }
    }

    // 생성 폼 토글
    function toggleCreateForm() {
        const form = document.getElementById('create-survey-form');
        form.classList.toggle('hidden');
        if (!form.classList.contains('hidden')) {
            document.getElementById('new-survey-title').focus();
        }
    }

    // 개발 모드용 Mock 응답 처리
    function handleMockResponse(url, method) {
        console.log(`[MOCK] ${method} ${url}`);

        // 설문 목록 조회
        if (url.includes('/survey-management/surveys') && method === 'GET') {
            return {
                surveyList: [
                    {
                        surveyId: 1,
                        title: '샘플 설문 1 (개발 모드)',
                        status: 'WRITING',
                        creatorName: '테스트 사용자',
                        createdAt: '2026-01-29'
                    },
                    {
                        surveyId: 2,
                        title: '샘플 설문 2 (개발 모드)',
                        status: 'ACTIVE',
                        creatorName: '테스트 사용자',
                        createdAt: '2026-01-28'
                    }
                ]
            };
        }

        // 설문 생성
        if (url.includes('/survey-form/surveys') && method === 'POST') {
            const mockSurveyId = Date.now();
            showToast('[개발 모드] 설문이 생성되었습니다.', 'success');
            return { surveyId: mockSurveyId };
        }

        // 문항 저장
        if (url.includes('/questions') && method === 'PUT') {
            showToast('[개발 모드] 문항이 저장되었습니다.', 'success');
            return { questionIds: [] };
        }

        // 설문 게시
        if (url.includes('/free') && method === 'PATCH') {
            showToast('[개발 모드] 설문이 게시되었습니다.', 'success');
            return { surveyId: currentSurveyId };
        }

        // 작성 중인 설문 조회
        if (url.includes('/writing') && method === 'GET') {
            return { questions: [] };
        }

        return null;
    }

    // 토스트 메시지 표시
    function showToast(message, type = 'info') {
        // 기존 토스트 제거
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) existingToast.remove();

        const toast = document.createElement('div');
        toast.className = `toast-message fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-lg z-50 transition-all transform translate-y-0 ${
            type === 'error' ? 'bg-red-500 text-white' :
            type === 'success' ? 'bg-green-500 text-white' :
            'bg-slate-800 text-white'
        }`;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('opacity-0', 'translate-y-2');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // ==================== 설문 API ====================

    // 설문 생성
    async function createSurvey() {
        const titleInput = document.getElementById('new-survey-title');
        const descriptionInput = document.getElementById('new-survey-description');

        if (!titleInput || !descriptionInput) {
            console.error("HTML 요소를 찾을 수 없습니다. HTML ID를 확인하세요.");
            return null;
        }

        const title = titleInput.value.trim();
        const description = descriptionInput.value.trim();

        if (!title) {
            showToast('설문 제목을 입력해주세요.', 'error');
            titleInput.focus();
            return null;
        }

        try {
            const response = await apiCall('/survey-form/surveys', 'POST',
                {
                    title: title,
                    description: description
                }
            );

            const builderData = {
                surveyId: response.surveyId,
                title: response.title,
                description: response.description,
                totalCoin: response.totalCoin,
                createdAt: response.createdAt
            }

            currentSurveyId = builderData.surveyId;
            isNewSurvey = false;

            openBuilder('new', builderData);

            titleInput.value = '';
            descriptionInput.value = '';
            toggleCreateForm();
            showToast('설문이 생성되었습니다.', 'success');
            return response;
        } catch (error) {
            return null;
        }
    }

    // 설문 정보 수정 (제목, 설명)
    async function updateSurveyDisplay() {
        if (!currentSurveyId) return null;

        const title = document.getElementById('survey-title').value.trim();
        const description = document.getElementById('survey-description').value.trim();

        try {
            const response = await apiCall(`/survey-form/surveys/${currentSurveyId}/display`, 'PATCH', {
                title,
                description
            });

            showToast('설문 정보가 수정되었습니다.', 'success');
            return response;
        } catch (error) {
            return null;
        }
    }

    // 문항 데이터 수집
    function collectQuestionData() {
        const questions = [];
        const sectionItems = document.querySelectorAll('.section-item');

        let globalOrder = 0;
        sectionItems.forEach((section, secIndex) => {
            const sectionOrder = secIndex + 1;

            const questionItems = section.querySelectorAll('.question-item');
            questionItems.forEach((item) => {
                globalOrder++;

                const questionId = item.getAttribute('data-question-id');

                const frontendType = item.getAttribute('data-question-type') || 'choice';
                const questionType = QUESTION_TYPE_MAP[frontendType];

                const titleInput = item.querySelector('.question-title-input');
                const descInput = item.querySelector('.question-desc-input');
                const requiredCheckbox = item.querySelector('.required-checkbox');

                // [신규] 분기 설정 체크박스
                const routeCheckbox = item.querySelector('.route-checkbox');
                const isSectionDecidable = routeCheckbox ? routeCheckbox.checked : false;

                // [신규] 직접 입력 체크박스 값 수집
                const customInputOption = item.querySelector('.option-item[data-option-type="direct-input"]');
                const hasCustomInput = !!customInputOption;

                const questionData = {
                    questionId: questionId,
                    questionType: questionType,
                    title: titleInput ? titleInput.value : '',
                    description: descInput ? descInput.value : '',
                    isRequired: requiredCheckbox ? requiredCheckbox.checked : false,
                    isSectionDecidable: isSectionDecidable,
                    questionOrder: globalOrder,
                    section: sectionOrder
                };

                // 객관식인 경우 옵션 데이터 추가
                if (questionType === 'CHOICE') {
                    const maxSelectDropdown = item.querySelector('.max-select-count');
                    questionData.maxChoice = maxSelectDropdown ? parseInt(maxSelectDropdown.value) : 1;
                    questionData.hasNoneOption = false;
                    questionData.hasCustomInput = hasCustomInput;
                    questionData.options = collectOptionData(item, isSectionDecidable);
                }

                // 평가형인 경우
                if (questionType === 'RATING') {
                    const ratingCircles = item.querySelector('.rating-circles');
                    const leftLabel = item.querySelector('.rating-label-left');
                    const rightLabel = item.querySelector('.rating-label-right');

                    questionData.rate = ratingCircles ? parseInt(ratingCircles.getAttribute('data-count')) : 5;
                    questionData.minValue = leftLabel ? leftLabel.value : '낮음';
                    questionData.maxValue = rightLabel ? rightLabel.value : '높음';
                }

                // 날짜형인 경우
                if (questionType === 'DATE') {
                    const dateInput = item.querySelector('.default-date-input');

                    questionData.defaultDate = dateInput ? dateInput.value : null;
                }

                questions.push(questionData);
            });
        });

        return questions;
    }

    // 옵션 데이터 수집
    function collectOptionData(questionItem, isBranchingEnabled) {
        const options = [];
        const optionItems = questionItem.querySelectorAll('.option-item[data-option-type="normal"]');

        optionItems.forEach((optionItem, index) => {
            const textInput = optionItem.querySelector('.option-text-input');
            const jumpSelect = optionItem.querySelector('.jump-select');

            let nextSection = null;

            const storedOptionId = optionItem.getAttribute('data-option-id');
            const optionId = storedOptionId ? parseInt(storedOptionId) : null;

            // 분기 설정이 켜져있고, 값이 선택된 경우에만 수집
            if (isBranchingEnabled && jumpSelect && jumpSelect.value !== "") {
                nextSection = parseInt(jumpSelect.value);
            }

            options.push({
                optionId: optionId,
                content: textInput ? textInput.value : '',
                nextSection: nextSection
            });
        });

        return options;
    }

    // 문항 일괄 저장 (임시저장)
    async function saveQuestions() {
        if (!currentSurveyId) {
            // 설문이 아직 생성되지 않았으면 먼저 생성
            const surveyResponse = await createSurvey();
            if (!surveyResponse) return null;
        }

        if (isSaving) return null;
        isSaving = true;

        try {
            const questions = collectQuestionData();

            if (questions.length === 0) {
                showToast('저장할 문항이 없습니다.', 'error');
                return null;
            }

            const response = await apiCall(`/survey-form/surveys/${currentSurveyId}/questions`, 'PUT', {
                questions
            });

            // 반환된 questionId 매핑 업데이트
            if (response && response.questionIds) {
                const questionItems = document.querySelectorAll('.question-item');
                questionItems.forEach((qItem, qIndex) => {
                    const savedQuestion = response.questions[qIndex];
                    if (!savedQuestion) return;

                    // 1. 문항 ID 업데이트
                    if (savedQuestion.questionId) {
                        qItem.setAttribute('data-question-id', savedQuestion.questionId); // DOM 업데이트 (선택사항)
                    }

                    // 2. 옵션 ID 업데이트 (객관식인 경우)
                    if (savedQuestion.questionType === 'CHOICE' && savedQuestion.options) {
                        const optionItems = qItem.querySelectorAll('.option-item[data-option-type="normal"]');

                        optionItems.forEach((optItem, optIndex) => {
                            const savedOption = savedQuestion.options[optIndex];
                            if (savedOption && savedOption.optionId) {
                                optItem.setAttribute('data-option-id', savedOption.optionId);
                            }
                        });
                    }
                });
            }

            showToast('문항이 저장되었습니다.', 'success');
            return response;
        } catch (error) {
            console.error(error);
            showToast('저장 중 오류가 발생했습니다.', 'error');
            return null;
        } finally {
            isSaving = false;
        }
    }



    // 설문 완성 (게시)
    async function completeSurvey() {
        if (!currentSurveyId) {
            showToast('먼저 설문을 생성해주세요.', 'error');
            return null;
        }

        // 먼저 문항 저장
        const saveResult = await saveQuestions();
        if (!saveResult) return null;

        try {
            // 무료 설문으로 완성 (기본)
            const response = await apiCall(`/survey-form/surveys/${currentSurveyId}`, 'PATCH', {
                targetCount: 100  // 기본 목표 응답 수
            });

            showToast('설문이 게시되었습니다!', 'success');

            // 목록으로 이동
            setTimeout(() => {
                goToPage('list');
                loadSurveyList();
            }, 1000);

            return response;
        } catch (error) {
            return null;
        }
    }

    // 작성 중인 설문 조회
    async function loadSurveyForEdit(surveyId) {
        try {
            const response = await apiCall(`/survey-management/writing?surveyId=${surveyId}`, 'GET');

            currentSurveyId = surveyId;
            isNewSurvey = false;

            // 문항 데이터 로드
            if (response && response.questions) {
                await renderLoadedQuestions(response.questions);
            }

            return response;
        } catch (error) {
            return null;
        }
    }

    // 조회된 문항 렌더링
    async function renderLoadedQuestions(questions) {
        // 기존 섹션 비우기
        const sectionList = document.getElementById('section-list');
        sectionList.innerHTML = '';

        // 섹션별로 문항 그룹화
        // 가정: questions 배열에 section 값이 있음
        const sectionsMap = new Map();

        // 최대 섹션 번호 찾기
        let maxSection = 0;
        questions.forEach(q => {
            if(q.section > maxSection) maxSection = q.section;
        });
        if(maxSection === 0) maxSection = 1; // 최소 1개

        // 섹션 UI 생성
        sectionCounter = 0;
        for(let i=1; i<=maxSection; i++) {
            addSection();
        }

        // questionCounter 리셋
        questionCounter = 0;
        questionIdMap.clear();

        // 문항 순서대로 정렬
        questions.sort((a, b) => a.questionOrder - b.questionOrder);
        const sectionItems = document.querySelectorAll('.section-item');

        for (const q of questions) {
            questionCounter++;
            const frontendType = QUESTION_TYPE_REVERSE_MAP[q.questionType] || 'choice';
            const isSectionDecidable = q.isSectionDecidable || false;
            const hasCustomInput = q.hasCustomInput || false;

            const defaultDate = q.defaultDate || null;

            // DOM 생성 (append는 아직)
            const newQuestionEl = addNewQuestion(q.questionId, q.title, q.description, questionCounter, frontendType, isSectionDecidable, hasCustomInput, defaultDate);

            // 적절한 섹션 찾기 (q.section이 1이면 index 0)
            const targetSection = sectionItems[(q.section || 1) - 1];
            if(targetSection) {
                targetSection.querySelector('.section-questions').appendChild(newQuestionEl);
            }

            // 필수값 체크
            const reqCheck = newQuestionEl.querySelector('.required-checkbox');
            if (reqCheck) reqCheck.checked = q.isRequired || false;

            // 옵션 및 분기 설정 로드
            if (q.questionType === 'CHOICE') {
                const container = newQuestionEl.querySelector('.options-container');
                container.innerHTML = '';

                // 분기 설정이 켜져있다면 옵션 목록을 미리 채워둬야 값을 세팅할 수 있음
                if (isSectionDecidable) {
                    updateSectionJumpOptions(newQuestionEl, true);
                }

                q.options.forEach(opt => {
                    // 옵션 추가
                    addOptionWithData(newQuestionEl, opt.content, opt.optionId, opt.nextSection, isSectionDecidable);
                });

                if (hasCustomInput) {
                    addDirectInputOption(q.questionId);
                }

                // Max Choice 설정
                const maxSel = newQuestionEl.querySelector('.max-select-count');
                if (maxSel && q.maxChoice) {
                    updateMaxSelectOptions(q.questionId); // 옵션 수 기반 리스트 갱신
                    maxSel.value = q.maxChoice;
                }
            }

            // 평가형 설정
            if (q.questionType === 'RATING') {
                const ratingCircles = newQuestionEl.querySelector('.rating-circles');
                const leftLabel = newQuestionEl.querySelector('.rating-label-left');
                const rightLabel = newQuestionEl.querySelector('.rating-label-right');

                if (ratingCircles && q.rate) {
                    ratingCircles.setAttribute('data-count', q.rate);
                    // 동그라미 다시 렌더링
                    let circlesHTML = '';
                    for (let i = 1; i <= q.rate; i++) {
                        circlesHTML += `<span class="w-8 h-8 rounded-full border-2 border-slate-300 flex items-center justify-center text-xs text-slate-400">${i}</span>`;
                    }
                    ratingCircles.innerHTML = circlesHTML;
                }

                if (leftLabel && q.minValue) leftLabel.value = q.minValue;
                if (rightLabel && q.maxValue) rightLabel.value = q.maxValue;
            }
        }

        updateQuestionNumbers();

        // 렌더링 완료 후 일괄 업데이트 권장
        refreshAllJumpSelects();
    }

    // 옵션 추가 (데이터 포함)
    // [보조] 옵션 데이터와 함께 추가 (render용)
    function addOptionWithData(questionEl, content, optionId, nextSection, isBranching) {
        const container = questionEl.querySelector('.options-container');
        const visibilityClass = isBranching ? '' : 'hidden';

        const newOption = document.createElement('div');
        newOption.className = 'option-item flex items-center gap-3 mb-3';
        newOption.setAttribute('data-option-type', 'normal');

        if (optionId) {
            newOption.setAttribute('data-option-id', optionId);
        }

        newOption.innerHTML = `
            <i class="far fa-circle text-slate-300"></i>
            <input type="text" value="${escapeHtml(content)}" class="option-text-input w-1/3 text-sm border border-slate-200 rounded px-2 py-1.5 hover:border-slate-300 focus:border-indigo-500 outline-none">

            <div class="jump-select-wrapper flex items-center gap-2 flex-1 ${visibilityClass}">
                <i class="fas fa-arrow-right text-orange-400 text-xs"></i>
                <select class="jump-select w-48 text-xs border border-orange-200 rounded px-2 py-1.5 text-slate-600 bg-orange-50 hover:bg-white focus:ring-1 focus:ring-orange-500">
                    <option value="">이동할 섹션 선택</option>
                </select>
            </div>

            <button class="text-slate-300 hover:text-red-400"><i class="fas fa-times"></i></button>
        `;

        // 삭제 버튼 등 이벤트 연결은 위 HTML onclick이나 addEventListener로 처리 (여기선 onclick string 가정)
        // 실제 구현 시 onclick="deleteOption(this, '${questionEl.getAttribute('data-question-id')}')" 형태 필요
        const qId = questionEl.getAttribute('data-question-id');
        newOption.querySelector('button').setAttribute('onclick', `deleteOption(this, '${qId}')`);
        newOption.querySelector('.option-text-input').setAttribute('oninput', `updateMaxSelectOptions('${qId}')`);

        container.appendChild(newOption);

        // 분기 설정이 켜져있으면 드롭다운 채우고 값 세팅
        if (isBranching) {
            updateSectionJumpOptions(questionEl, true); // 드롭다운 option 생성
            if (nextSection !== null && nextSection !== undefined) {
                const select = newOption.querySelector('.jump-select');
                select.value = nextSection;
            }
        }
    }

    // HTML 이스케이프
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 설문 목록 조회
    async function loadSurveyList() {
        try {
            const response = await apiCall('/survey-management/surveys', 'GET');

            if (response && response.surveyList) {
                renderSurveyList(response.surveyList);
            }
        } catch (error) {
            console.error('설문 목록 조회 실패:', error);
        }
    }

    // 설문 목록 렌더링
    function renderSurveyList(surveyList) {
        const tbody = document.querySelector('#view-list tbody');
        if (!tbody) return;

        tbody.innerHTML = surveyList.map(survey => `
            <tr class="hover:bg-slate-50 transition-colors">
                <td class="px-6 py-4 text-slate-400">#${survey.surveyId}</td>
                <td class="px-6 py-4 font-bold text-slate-800 cursor-pointer hover:text-indigo-600" onclick="openBuilderWithSurvey(${survey.surveyId})">
                    ${escapeHtml(survey.title)}
                </td>
                <td class="px-6 py-4">
                    <span class="${getStatusBadgeClass(survey.status)} px-2 py-1 rounded text-xs font-bold">
                        ${getStatusText(survey.status)}
                    </span>
                </td>
                <td class="px-6 py-4">${survey.creatorName || '-'}</td>

        `).join('');

    // 상태 배지 클래스
    function getStatusBadgeClass(status) {
        switch(status) {
            case 'WRITING': return 'bg-slate-100 text-slate-600';
            case 'ACTIVE': return 'bg-green-100 text-green-700';
            case 'CLOSED': return 'bg-red-100 text-red-600';
            default: return 'bg-slate-100 text-slate-600';
        }
    }

    // 상태 텍스트
    function getStatusText(status) {
        switch(status) {
            case 'WRITING': return '작성중';
            case 'ACTIVE': return '진행중';
            case 'CLOSED': return '종료';
            default: return status;
        }
    }

    // 날짜 포맷
    function formatDate(dateString) {
        if (!dateString) return '-';
        const date = new Date(dateString);
        return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
    }

    // 기존 설문 편집 모드로 열기
    async function openBuilderWithSurvey(surveyId) {
        document.getElementById('view-list').classList.add('hidden');
        document.getElementById('view-builder').classList.remove('hidden');

        // 설문 데이터 로드
        await loadSurveyForEdit(surveyId);
    }

    // 설문 조회 (읽기 전용)
    function viewSurvey(surveyId) {
        alert('진행 중인 설문은 상세 페이지만 볼 수 있습니다.');
    }

    // ==================== 화면 전환 ====================

    function goToPage(page) {
        if(page === 'list') {
            document.getElementById('view-list').classList.remove('hidden');
            document.getElementById('view-builder').classList.add('hidden');

            // 상태 초기화
            currentSurveyId = null;
            isNewSurvey = true;
            questionIdMap.clear();
            questionCounter = 0;
        }
    }

    function openBuilder(mode, data) {
        document.getElementById('view-list').classList.add('hidden');
        document.getElementById('view-builder').classList.remove('hidden');

        if (mode === 'new') {
            // 새 설문 모드 - 초기화
            questionIdMap.clear();
            questionCounter = 0;

            // 입력 필드 초기화
            document.getElementById('survey-title').value = data.title;
            document.getElementById('survey-description').value = data.description;
            document.getElementById('desc-preview').textContent = '설문 설명을 입력하세요';

            document.getElementById('section-list').innerHTML = '';
            sectionCounter = 0;
            questionCounter = 0;
            questionIdMap.clear();

            addSection();

            // 기존 문항 제거
            const existingQuestions = document.querySelectorAll('.question-item');
            existingQuestions.forEach(q => q.remove());
        }

        console.log("Current Mode:", mode);
    }

    // [신규] 모든 문항의 점프 셀렉트 박스 일괄 갱신 (섹션 추가/삭제 시 호출)
    function refreshAllJumpSelects() {
        // 모든 문항 아이템을 찾음
        const allQuestions = document.querySelectorAll('.question-item');

        allQuestions.forEach(qItem => {
            // 분기 설정이 켜져있는지 확인
            const routeCheckbox = qItem.querySelector('.route-checkbox');
            if (routeCheckbox && routeCheckbox.checked) {
                // 해당 문항의 옵션들을 업데이트
                updateSectionJumpOptions(qItem, true);
            }
        });
    }

    // 섹션 삭제
    function deleteSection(btn) {
        if (!confirm('섹션과 내부의 모든 문항이 삭제됩니다. 계속하시겠습니까?')) return;
        const sectionItem = btn.closest('.section-item');
        sectionItem.remove();
        updateSectionNumbers();
        updateQuestionNumbers(); // 문항 번호도 전체 재정렬

        refreshAllJumpSelects(); // 섹션 선택 드롭다운 갱신
    }

    // 섹션 번호 UI 업데이트
    function updateSectionNumbers() {
        const sections = document.querySelectorAll('.section-item');
        sections.forEach((sec, index) => {
            sec.querySelector('.section-display-num').textContent = index + 1;
            sec.setAttribute('data-section-order', index + 1);
        });
    }

    // 설문 설명 토글 기능
    let isDescriptionExpanded = false;

    function toggleDescription() {
        const toggleBtn = document.getElementById('desc-toggle-btn');
        const preview = document.getElementById('desc-preview');
        const editArea = document.getElementById('desc-edit');
        const textarea = document.getElementById('survey-description');

        isDescriptionExpanded = !isDescriptionExpanded;

        if (isDescriptionExpanded) {
            toggleBtn.style.transform = 'rotate(180deg)';
            toggleBtn.parentElement.classList.add('hidden');
            preview.classList.add('hidden');
            editArea.classList.remove('hidden');
            textarea.focus();
        } else {
            toggleBtn.style.transform = 'rotate(0deg)';
            toggleBtn.parentElement.classList.remove('hidden');
            preview.classList.remove('hidden');
            editArea.classList.add('hidden');
        }
    }

    function saveDescription() {
        const textarea = document.getElementById('survey-description');
        const preview = document.getElementById('desc-preview');

        preview.textContent = textarea.value.split('\n')[0] || '설문 설명을 입력하세요';
        toggleDescription();
    }

    // 문항 설명 textarea 확장
    function expandDescTextarea(textarea) {
        textarea.style.maxHeight = '150px';
        textarea.style.whiteSpace = 'pre-wrap';
        textarea.style.overflowY = 'auto';
        // 내용에 맞게 높이 조절
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
    }

    // 문항 설명 textarea 축소
    function collapseDescTextarea(textarea) {
        textarea.style.maxHeight = '28px';
        textarea.style.whiteSpace = 'nowrap';
        textarea.style.overflowY = 'hidden';
        textarea.style.height = '28px';
    }

    // 문항 관련 변수
    let questionCounter = 0;
    // 섹션 번호 카운터
    let sectionCounter = 0;

    // 특정 섹션에 문항 추가 (버튼 클릭 시 호출)
    async function addNewQuestionToSection(btnElement) {
        // 1. 클릭된 버튼이 속한 섹션 찾기
        const sectionItem = btnElement.closest('.section-item');
        const formContainer = btnElement.closest('.add-question-form');

        // 2. 입력값 찾기
        const titleInput = formContainer.querySelector('.new-question-title');
        const descInput = formContainer.querySelector('.new-question-desc');
        const typeInput = formContainer.querySelector('.new-question-type');

        const title = titleInput.value.trim();
        const description = descInput.value.trim();
        const frontendType = typeInput.value;
        const section = parseInt(sectionItem.getAttribute('data-section-order'));

        if (!title) {
            titleInput.focus();
            titleInput.classList.add('border-red-400', 'ring-1', 'ring-red-400');
            setTimeout(() => {
                titleInput.classList.remove('border-red-400', 'ring-1', 'ring-red-400');
            }, 2000);
            return;
        }

        try {
            // 전체 문항 수 계산 (순서용)
            const totalQuestions = document.querySelectorAll('.question-item').length;

            // 3. API 호출
            const response = await apiCall(`/survey-form/surveys/${currentSurveyId}/questions`, 'POST',
                {
                    questions: [
                        {
                            title: title,
                            description: description,
                            questionType: QUESTION_TYPE_MAP[frontendType],
                            questionOrder: totalQuestions + 1,
                            section: section
                        }
                    ]
                }
            );

            // 4. UI 생성 및 추가 (여기가 수정됨)
            const questionsContainer = sectionItem.querySelector('.section-questions');

            // addNewQuestion은 이제 요소를 반환만 함. appendChild는 여기서 수행.
            const newQuestionEl = addNewQuestion(
                response.questionId,
                response.title,
                response.description,
                totalQuestions + 1, // order (UI 표시용)
                QUESTION_TYPE_REVERSE_MAP[response.type]
            );

            // 비어있음 안내문구가 있다면 숨김 처리
            const emptyPlaceholder = questionsContainer.querySelector('.empty-placeholder');
            if (emptyPlaceholder) emptyPlaceholder.classList.add('hidden');

            questionsContainer.appendChild(newQuestionEl);

            // 5. 입력란 초기화
            titleInput.value = '';
            descInput.value = '';

            updateQuestionNumbers();
            // 새 문항에 대한 섹션 이동 옵션 초기화 (분기 설정이 꺼져있으므로 숨김 상태로 시작)
            updateSectionJumpOptions(newQuestionEl, false);

            showToast('새 문항이 생성되었습니다.', 'success');
            return response;
        } catch (error) {
            console.error(error);
            showToast('문항 생성에 실패했습니다.', 'error');
            return null;
        }
    }

    // 새 문항 DOM 생성 (반환만 수행)
    function addNewQuestion(questionId = null, title = '', description = '', order = 0, type = 'choice', isSectionDecidable = false, hasCustomInput = false, defaultDate = null) {

        newQuestion.setAttribute('data-question-id', questionId);
        newQuestion.setAttribute('data-question-type', type);

        // 드래그 이벤트
        newQuestion.setAttribute('draggable', 'true');
        newQuestion.addEventListener('dragstart', handleDragStart);
        newQuestion.addEventListener('dragend', handleDragEnd);
        // dragover/drop은 섹션 컨테이너에서 처리하므로 여기서 제거하거나 유지해도 무방

        // 타입별 표시 클래스
        const showChoice = type === 'choice' ? '' : 'hidden';
        const showText = type === 'text' ? '' : 'hidden';
        const showTextarea = type === 'textarea' ? '' : 'hidden';
        const showRating = type === 'rating' ? '' : 'hidden';
        const showNps = type === 'nps' ? '' : 'hidden';
        const showNumber = type === 'number' ? '' : 'hidden';
        const showDate = type === 'date' ? '' : 'hidden';

        // [신규] 섹션 분기 설정 체크박스 표시 여부 (객관식일 때만)
        const showRouteConfig = type === 'choice' ? '' : 'hidden';

        // 객관식일 때만: 분기 설정, 직접 입력 설정 표시
        const directBtnDisabled = hasCustomInput ? 'disabled class="direct-input-btn text-xs text-slate-300 cursor-not-allowed px-2 py-1 rounded inline-block"' : 'class="direct-input-btn text-xs text-emerald-600 font-bold hover:bg-emerald-50 px-2 py-1 rounded inline-block"';

        // 분기 설정이 true이면 옵션의 select box를 보여줌
        const jumpSelectClass = isSectionDecidable ? '' : 'hidden';

        newQuestion.innerHTML = `
            <div class="w-64 bg-slate-50 border-r border-slate-200 p-4 flex flex-col gap-4 shrink-0">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <div class="drag-handle cursor-grab active:cursor-grabbing text-slate-400 hover:text-slate-600 mr-1">
                            <i class="fas fa-grip-vertical"></i>
                        </div>
                        <span class="question-number bg-slate-200 text-slate-600 text-xs px-2 py-0.5 rounded font-bold">Q${order}</span>
                        <span class="bg-indigo-100 text-indigo-700 text-xs px-2 py-0.5 rounded font-bold border border-indigo-200">
                            ${QUESTION_TYPE_LABEL[type]}
                        </span>
                    </div>
                    <button class="text-slate-400 hover:text-red-500 transition-colors" title="문항 삭제" onclick="deleteQuestion('${questionId}')">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>

                <input type="hidden" class="question-type-value" value="${type}">

                <div class="max-select-container" style="${type === 'choice' ? '' : 'display:none'}">
                    <label class="text-xs text-slate-500 font-bold block mb-1">최대 선택 개수</label>
                    <select class="max-select-count w-full text-sm border-slate-300 rounded p-1.5 border bg-white focus:ring-indigo-500">
                        <option value="1">1개</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-slate-600 font-medium">필수 응답</span>
                        <input type="checkbox" class="required-checkbox w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500">
                    </div>

                    <div class="route-config-container flex items-center justify-between ${showRouteConfig}">
                        <span class="text-xs text-slate-600 font-medium text-orange-600">섹션 분기 설정</span>
                        <input type="checkbox" class="route-checkbox w-4 h-4 text-orange-600 rounded focus:ring-orange-500"
                               ${isSectionDecidable ? 'checked' : ''}
                               onchange="toggleSectionBranching(this)">
                    </div>
                </div>
            </div>

            <div class="flex-1 p-6">
                <input type="text" class="question-title-input w-full text-lg font-bold border-b-2 border-slate-100 focus:border-indigo-500 outline-none pb-2 mb-2 transition-colors" placeholder="질문을 입력하세요" value="${escapeHtml(title)}">
                <textarea class="question-desc-input w-full text-sm text-slate-500 border-b border-slate-100 focus:border-indigo-400 outline-none pb-2 mb-4 transition-all resize-none overflow-hidden" placeholder="문항에 대한 설명을 입력하세요 (선택사항)" rows="1" onfocus="expandDescTextarea(this)" onblur="collapseDescTextarea(this)">${escapeHtml(description)}</textarea>

                <div class="choice-options space-y-3 pl-2 ${showChoice}">
                    <div class="options-container" data-question-id="${questionId}">
                        ${type === 'choice' ? getInitialOptionHTML(questionId, jumpSelectClass) : ''}
                    </div>
                    <div class="flex gap-2">
                        <button class="text-xs text-indigo-600 font-bold hover:bg-indigo-50 px-2 py-1 rounded inline-block" onclick="addOption('${questionId}')">+ 옵션 추가</button>
                        <button ${directBtnDisabled} onclick="addDirectInputOption('${questionId}')">+ 직접 입력 추가</button>
                    </div>
                </div>

                <div class="text-options ${showText}"><div class="bg-slate-50 border border-dashed border-slate-300 rounded p-4 text-slate-400 text-sm">단답형 입력 영역</div></div>
                <div class="textarea-options ${showTextarea}"><div class="bg-slate-50 border border-dashed border-slate-300 rounded p-4 text-slate-400 text-sm h-24">장문형 입력 영역</div></div>
                <div class="rating-options ${showRating}"></div>
                <div class="nps-options ${showNps}"></div>
                <div class="number-options ${showNumber}"></div>
                <div class="date-options ${showDate}">
                     <div class="flex flex-col gap-3">
                        <div class="bg-slate-50 border border-dashed border-slate-300 rounded p-4 text-slate-400 text-sm flex items-center gap-2"><i class="fas fa-calendar-alt"></i> 사용자가 날짜를 선택하는 영역입니다.</div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-slate-500 font-medium">기본 날짜 설정:</span>
                            <input type="date" class="default-date-input text-sm border border-slate-200 rounded px-2 py-1.5 focus:border-indigo-500 outline-none" value="${defaultDate || ''}">

        `;

        // 주의: 이 함수는 appendChild를 하지 않고 요소를 반환만 합니다.
        // 호출자가 적절한 위치에 append 해야 합니다.
        return newQuestion;
    }

    // 객관식 초기 옵션 HTML 생성 (분기 select 표시 여부 포함)
    function getInitialOptionHTML(qid, visibilityClass = 'hidden') {
        // 초기 옵션은 ID가 없으므로 data-option-id 속성 생략 또는 비워둠
        return `
        <div class="option-item flex items-center gap-3 mb-3" data-option-type="normal"></div>
        `;
    }

    // [신규] 섹션 분기 체크박스 토글
    function toggleSectionBranching(checkbox) {
        const questionItem = checkbox.closest('.question-item');
        const isChecked = checkbox.checked;
        const jumpWrappers = questionItem.querySelectorAll('.jump-select-wrapper');

        jumpWrappers.forEach(wrapper => {
            if (isChecked) {
                wrapper.classList.remove('hidden');
                // 섹션 목록 업데이트 (현재 섹션 제외, 0번 포함)
                updateSectionJumpOptions(questionItem, true);
            } else {
                wrapper.classList.add('hidden');
                // 체크 해제 시 select 값 초기화
                const select = wrapper.querySelector('select');
                if(select) select.value = "";
            }
        });
    }

    // [신규] 문항 내의 모든 점프 셀렉트 박스에 섹션 목록 업데이트
    function updateSectionJumpOptions(questionItem, isBranchingOn) {
        if (!isBranchingOn) return;

        const currentSectionItem = questionItem.closest('.section-item');
        if (!currentSectionItem) return;

        const currentSectionOrder = parseInt(currentSectionItem.getAttribute('data-section-order'));
        const totalSections = document.querySelectorAll('.section-item').length;

        // [로직] 다음 섹션 계산 (없으면 0:설문 종료)
        const nextSectionValue = (currentSectionOrder < totalSections) ? (currentSectionOrder + 1).toString() : "0";

        const selects = questionItem.querySelectorAll('.jump-select');

        selects.forEach(select => {
            const currentValue = select.value;
            select.innerHTML = ''; // 초기화

            // 기본 안내
            const defaultOpt = document.createElement('option');
            defaultOpt.value = "";
            defaultOpt.text = "이동할 섹션 선택";
            defaultOpt.disabled = true;
            select.appendChild(defaultOpt);

            // 설문 제출 (0)
            const submitOpt = document.createElement('option');
            submitOpt.value = "0";
            submitOpt.text = "설문 제출 (종료)";
            submitOpt.classList.add('font-bold', 'text-indigo-600');
            select.appendChild(submitOpt);

            // 섹션 목록 (자기 자신 제외)
            for (let i = 1; i <= totalSections; i++) {
                if (i === currentSectionOrder) continue;

                const opt = document.createElement('option');
                opt.value = i;
                opt.text = `섹션 ${i}로 이동`;
                select.appendChild(opt);
            }

            // 값 복원 (유효한 값일 경우만)
            if (currentValue && (currentValue === "0" || (parseInt(currentValue) <= totalSections && parseInt(currentValue) !== currentSectionOrder))) {
                select.value = currentValue;
            } else {
                select.value = nextSectionValue; // 섹션이 삭제되어 유효하지 않게 되면 초기화
            }
        });
    }

    // 문항 삭제
    function deleteQuestion(questionId) {
        const question = document.querySelector(`.question-item[data-question-id="${questionId}"]`);
        if (question) {
            question.remove();
            updateQuestionNumbers();
            updateAllJumpSelects();
        }
    }

    // 문항 번호 업데이트
    function updateQuestionNumbers() {
        const questions = document.querySelectorAll('.question-item');
        questions.forEach((q, index) => {
            const numberSpan = q.querySelector('.question-number');
            if (numberSpan) {
                numberSpan.textContent = `Q${index + 1}`;
            }
        });
    }

    // 문항 위로 이동
    function moveQuestionUp(questionId) {
        const question = document.querySelector(`.question-item[data-question-id="${questionId}"]`);
        if (!question) return;

        const prevQuestion = question.previousElementSibling;
        if (prevQuestion && prevQuestion.classList.contains('question-item')) {
            question.parentNode.insertBefore(question, prevQuestion);
            updateQuestionNumbers();
            updateAllJumpSelects();
        }
    }

    // 문항 아래로 이동
    function moveQuestionDown(questionId) {
        const question = document.querySelector(`.question-item[data-question-id="${questionId}"]`);
        if (!question) return;

        const nextQuestion = question.nextElementSibling;
        if (nextQuestion && nextQuestion.classList.contains('question-item')) {
            question.parentNode.insertBefore(nextQuestion, question);
            updateQuestionNumbers();
            updateAllJumpSelects();
        }
    }

    // 드래그 앤 드롭 관련 변수
    let draggedQuestion = null;

    // 드래그 시작
    function handleDragStart(e) {
        draggedQuestion = this;
        this.classList.add('opacity-50');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', this.getAttribute('data-question-id'));

        // 약간의 딜레이 후 스타일 적용 (드래그 이미지가 제대로 생성되도록)
        setTimeout(() => {
            this.classList.add('border-indigo-500', 'border-2');
        }, 0);
    }

    // 드래그 종료
    function handleDragEnd(e) {
        this.classList.remove('opacity-50', 'border-indigo-500', 'border-2');
        document.querySelectorAll('.question-item').forEach(item => {
            item.classList.remove('drag-over-top', 'drag-over-bottom');
        });
        draggedQuestion = null;
    }

    // 드래그 오버 (드롭 허용)
    function handleDragOver(e) {
        if (e.preventDefault) {
            e.preventDefault();
        }

        // 문항 위로 드래그하는지, 섹션 빈 공간으로 드래그하는지 확인
        const targetSection = e.target.closest('.section-questions');
        if (targetSection) {
            e.dataTransfer.dropEffect = 'move';
        }

        // 드래그 위치에 따라 상단/하단 표시
        const rect = this.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;

        this.classList.remove('drag-over-top', 'drag-over-bottom');

        if (e.clientY < midY) {
            this.classList.add('drag-over-top');
        } else {
            this.classList.add('drag-over-bottom');
        }

        return false;
    }

    // 드래그 진입
    function handleDragEnter(e) {
        if (e.preventDefault) {
            e.preventDefault();
        }
    }

    // 드래그 이탈
    function handleDragLeave(e) {
        this.classList.remove('drag-over-top', 'drag-over-bottom');
    }

    // 드롭
    function handleDrop(e) {
        e.stopPropagation();

        const draggedId = e.dataTransfer.getData('text/plain'); // dragStart에서 id 저장했다고 가정
        if (!draggedQuestion) return; // 전역 변수 draggedQuestion 사용 시

        // 드롭된 위치 찾기
        const dropTarget = e.target;
        const targetSectionList = dropTarget.closest('.section-questions');
        const targetQuestionItem = dropTarget.closest('.question-item');

        if (targetSectionList) {
            if (targetQuestionItem && targetQuestionItem !== draggedQuestion) {
                // 다른 문항 위/아래로 드롭
                const rect = targetQuestionItem.getBoundingClientRect();
                if (e.clientY < rect.top + rect.height / 2) {
                    targetSectionList.insertBefore(draggedQuestion, targetQuestionItem);
                } else {
                    targetSectionList.insertBefore(draggedQuestion, targetQuestionItem.nextSibling);
                }
            } else {
                // 섹션의 빈 공간(맨 끝)으로 드롭
                targetSectionList.appendChild(draggedQuestion);
            }

            // 이동 후 전체 재정렬
            updateQuestionNumbers();
            updateAllJumpSelects();
        }

        draggedQuestion.classList.remove('opacity-50', 'border-indigo-500', 'border-2');
        draggedQuestion = null;
    }

    // 문항 타입 토글
    function toggleQuestionType(questionId) {
        const question = document.querySelector(`.question-item[data-question-id="${questionId}"]`);
        const select = question.querySelector('.question-type');
        const choiceOptions = question.querySelector('.choice-options');
        const textOptions = question.querySelector('.text-options');
        const textareaOptions = question.querySelector('.textarea-options');
        const ratingOptions = question.querySelector('.rating-options');
        const npsOptions = question.querySelector('.nps-options');
        const numberOptions = question.querySelector('.number-options');
        const dateOptions = question.querySelector('.date-options');
        const maxSelectContainer = question.querySelector('.max-select-container');

        // 모든 옵션 숨기기
        const allOptions = [choiceOptions, textOptions, textareaOptions, ratingOptions, npsOptions, numberOptions, dateOptions];
        allOptions.forEach(opt => {
            if (opt) opt.classList.add('hidden');
        });

        // 최대 선택 개수는 기본적으로 숨기기
        if (maxSelectContainer) maxSelectContainer.classList.add('hidden');

        // 선택된 타입에 따라 표시
        switch (select.value) {
            case 'choice':
                if (choiceOptions) choiceOptions.classList.remove('hidden');
                if (maxSelectContainer) maxSelectContainer.classList.remove('hidden');
                break;
            case 'text':
                if (textOptions) textOptions.classList.remove('hidden');
                break;
            case 'textarea':
                if (textareaOptions) textareaOptions.classList.remove('hidden');
                break;
            case 'rating':
                if (ratingOptions) ratingOptions.classList.remove('hidden');
                break;
            case 'nps':
                if (npsOptions) npsOptions.classList.remove('hidden');
                break;
            case 'number':
                if (numberOptions) numberOptions.classList.remove('hidden');
                break;
            case 'date':
                if (dateOptions) dateOptions.classList.remove('hidden');
                break;
        }
    }

    // 평가형 동그라미 개수 조절
    function adjustRatingCount(questionId, delta) {
        const question = document.querySelector(`.question-item[data-question-id="${questionId}"]`);
        const ratingCircles = question.querySelector('.rating-circles');
        let count = parseInt(ratingCircles.getAttribute('data-count')) || 5;

        count += delta;

        // 2개에서 10개까지만 허용
        if (count < 2) count = 2;
        if (count > 10) count = 10;

        ratingCircles.setAttribute('data-count', count);

        // 동그라미 다시 렌더링
        let circlesHTML = '';
        for (let i = 1; i <= count; i++) {
            circlesHTML += `<span class="w-8 h-8 rounded-full border-2 border-slate-300 flex items-center justify-center text-xs text-slate-400">${i}</span>`;
        }
        ratingCircles.innerHTML = circlesHTML;
    }

    // 최대 선택 개수 옵션 업데이트
    function updateMaxSelectOptions(questionId) {
        const question = document.querySelector(`.question-item[data-question-id="${questionId}"]`);
        const container = question.querySelector('.options-container');
        const maxSelectDropdown = question.querySelector('.max-select-count');

        if (!maxSelectDropdown || !container) return;

        const optionCount = container.querySelectorAll('.option-item').length;
        const currentValue = maxSelectDropdown.value || 0;

        maxSelectDropdown.innerHTML = '';
        const limit = Math.max(optionCount, 0);

        for (let i = 1; i <= limit; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `${i}개`;

            if (i == currentValue) option.selected = true;
            maxSelectDropdown.appendChild(option);
        }

        if (currentValue > optionCount && optionCount > 0) {
            maxSelectDropdown.value = optionCount;
        }
    }

    // 문항 제목 15자 제한 함수
    function truncateTitle(title, maxLength = 15) {
        if (!title || title.trim() === '') return '제목 없음';
        return title.length > maxLength ? title.substring(0, maxLength) + '...' : title;
    }

    // 모든 이동 문항 드롭다운 업데이트
    function updateAllJumpSelects() {
        const questions = document.querySelectorAll('.question-item');
        const jumpSelects = document.querySelectorAll('.jump-select');

        jumpSelects.forEach(select => {
            const currentValue = select.value;
            const currentQuestionItem = select.closest('.question-item');
            const currentQuestionId = currentQuestionItem ? currentQuestionItem.getAttribute('data-question-id') : null;

            // 현재 문항의 순서(인덱스) 찾기
            let currentQuestionIndex = -1;
            questions.forEach((q, idx) => {
                if (q.getAttribute('data-question-id') === currentQuestionId) {
                    currentQuestionIndex = idx;
                }
            });

            select.innerHTML = `
                <option value="next">다음 섹션으로 이동 (기본)</option>
            `;

            questions.forEach((q, index) => {
                const qId = q.getAttribute('data-question-id');
                // 자기 자신 문항은 제외
                if (qId === currentQuestionId) return;

                // 현재 문항보다 이전 문항은 제외 (이전 문항으로 이동 불가)
                if (index <= currentQuestionIndex) return;

                const titleInput = q.querySelector('.question-title-input');
                const title = titleInput ? titleInput.value : '';
                const truncatedTitle = truncateTitle(title);
                const questionNum = index + 1;

                const option = document.createElement('option');
                option.value = `q${qId}`;
                option.textContent = `Q${questionNum}. ${truncatedTitle} 로 이동`;
                select.appendChild(option);
            });

            // 설문 종료 옵션 추가 (비활성화)
            const endOption = document.createElement('option');
            endOption.value = 'end';
            endOption.textContent = '설문 종료 (Screen Out)';
            endOption.disabled = true;
            endOption.className = 'text-slate-300';
            select.appendChild(endOption);

            // 기존 선택값 복원 (이전 문항으로 가는 값이었다면 기본값으로 리셋)
            if (currentValue && select.querySelector(`option[value="${currentValue}"]`)) {
                select.value = currentValue;
            } else {
                select.value = 'next';
            }
        });
    }

    // 옵션 추가
    function addOption(questionId) {
        const container = document.querySelector(`.options-container[data-question-id="${questionId}"]`);
        const questionItem = container.closest('.question-item');

        // 현재 분기 설정 여부 확인
        const routeCheckbox = questionItem.querySelector('.route-checkbox');
        const isBranching = routeCheckbox ? routeCheckbox.checked : false;
        const visibilityClass = isBranching ? '' : 'hidden';

        const newOption = document.createElement('div');
        newOption.className = 'option-item flex items-center gap-3 mb-3';
        newOption.setAttribute('data-option-type', 'normal');

        newOption.innerHTML = `
            <i class="far fa-circle text-slate-300"></i>
            <input type="text" placeholder="보기 내용 입력" class="option-text-input w-1/3 text-sm border border-slate-200 rounded px-2 py-1.5 hover:border-slate-300 focus:border-indigo-500 outline-none" oninput="updateMaxSelectOptions('${questionId}')">

            <div class="jump-select-wrapper flex items-center gap-2 flex-1 ${visibilityClass}">
                <i class="fas fa-arrow-right text-orange-400 text-xs"></i>
                <select class="jump-select w-48 text-xs border border-orange-200 rounded px-2 py-1.5 text-slate-600 bg-orange-50 hover:bg-white focus:ring-1 focus:ring-orange-500">
                    <option value="">이동할 섹션 선택</option>
                </select>
            </div>

            <button class="text-slate-300 hover:text-red-400" onclick="deleteOption(this, '${questionId}')"><i class="fas fa-times"></i></button>
        `;

        container.appendChild(newOption);

        // 분기 설정이 켜져있으면 드롭다운 내용 채우기
        if (isBranching) {
            updateSectionJumpOptions(questionItem, true);
        }

        updateMaxSelectOptions(questionId);
    }

    // 직접 입력 보기 추가
    function addDirectInputOption(questionId) {
        const container = document.querySelector(`.options-container[data-question-id="${questionId}"]`);
        const question = document.querySelector(`.question-item[data-question-id="${questionId}"]`);
        const directInputBtn = question.querySelector('.direct-input-btn');

        // 분기 설정 켜져있는지 확인
        const routeCheckbox = question.querySelector('.route-checkbox');
        const isBranching = routeCheckbox ? routeCheckbox.checked : false;
        const visibilityClass = isBranching ? '' : 'hidden';

        const directOption = document.createElement('div');
        directOption.className = 'option-item flex items-center gap-3 mb-3';
        directOption.setAttribute('data-option-type', 'direct-input');

        // [중요] 직접 입력 보기도 섹션 분기 드롭다운을 포함해야 함
        directOption.innerHTML = `
            <i class="far fa-edit text-emerald-400"></i>
            <div class="w-1/3 text-sm border border-emerald-200 bg-emerald-50 rounded px-2 py-1.5 text-emerald-600 font-medium">
                <i class="fas fa-keyboard mr-1"></i> 직접 입력
            </div>

            <div class="jump-select-wrapper flex items-center gap-2 flex-1 ${visibilityClass}">
                <i class="fas fa-arrow-right text-orange-400 text-xs"></i>
                <select class="jump-select w-48 text-xs border border-orange-200 rounded px-2 py-1.5 text-slate-600 bg-orange-50 hover:bg-white focus:ring-1 focus:ring-orange-500">
                    <option value="">이동할 섹션 선택</option>
                </select>
            </div>

            <button class="text-slate-300 hover:text-red-400" onclick="deleteDirectInputOption(this, '${questionId}')"><i class="fas fa-times"></i></button>
        `;

        // 항상 맨 뒤에 추가
        container.appendChild(directOption);

        // 분기 옵션 채우기
        if (isBranching) {
            updateSectionJumpOptions(question, true);
        }

        // 버튼 비활성화 (하나만 가능하므로)
        directInputBtn.disabled = true;
        directInputBtn.classList.remove('text-emerald-600', 'hover:bg-emerald-50');
        directInputBtn.classList.add('text-slate-300', 'cursor-not-allowed');

        updateMaxSelectOptions(questionId);
    }

    // 일반 옵션 삭제
    function deleteOption(button, questionId) {
        const optionItem = button.closest('.option-item');
        optionItem.remove();
        updateMaxSelectOptions(questionId);
        updateAllJumpSelects();
    }

    // 직접 입력 보기 삭제
    function deleteDirectInputOption(button, questionId) {
        const optionItem = button.closest('.option-item');
        const question = document.querySelector(`.question-item[data-question-id="${questionId}"]`);
        const directInputBtn = question.querySelector('.direct-input-btn');

        optionItem.remove();

        // 버튼 다시 활성화
        directInputBtn.disabled = false;
        directInputBtn.classList.remove('text-slate-300', 'cursor-not-allowed');
        directInputBtn.classList.add('text-emerald-600', 'hover:bg-emerald-50');

        updateMaxSelectOptions(questionId);
    }

    // 날짜 입력 동기화 함수
    function syncDateInputs(inputElement, source) {
        const dateOptions = inputElement.closest('.date-options');
        const dateInput = dateOptions.querySelector('.default-date-input');
        const textInput = dateOptions.querySelector('.default-date-text');

        if (source === 'calendar') {
            // 캘린더에서 선택한 경우 텍스트 입력란에 동기화
            textInput.value = dateInput.value;
        } else if (source === 'text') {
            // 텍스트로 입력한 경우 캘린더에 동기화
            const dateValue = textInput.value;
            // YYYY-MM-DD 형식 검증
            const dateRegex = /^\d{4}-\d{2}-\d{2}$/;
            if (dateRegex.test(dateValue)) {
                const date = new Date(dateValue);
                if (!isNaN(date.getTime())) {
                    dateInput.value = dateValue;
                }
            }
        }
    }

    // 페이지 로드 시 초기화
    document.addEventListener('DOMContentLoaded', function() {
        // 설문 목록 로드
        loadSurveyList();

        // Enter 키로 문항 추가
        const newQuestionTitle = document.getElementById('new-question-title');
        if (newQuestionTitle) {
            newQuestionTitle.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addNewQuestionWithData();
                }
            });
        }

        // 자동 저장 (5분마다)
        setInterval(() => {
            if (currentSurveyId && !isSaving) {
                console.log('자동 저장 실행...');
                saveQuestions();
            }
        }, 300000); // 5분 = 300000ms
    });
</script>
</body>
</html>
