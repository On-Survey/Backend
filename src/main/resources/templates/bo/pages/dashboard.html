<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!-- Dashboard Page Content Fragment -->
<div th:fragment="content" id="page-dashboard" class="page-section flex-1 overflow-y-auto p-8 space-y-6">
    <div class="grid grid-cols-4 gap-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="text-slate-500 text-xs font-bold uppercase mb-1">오늘 신규 설문</div>
            <div class="flex items-end justify-between">
                <span class="text-3xl font-bold text-slate-800">0건</span>
                <span class="text-green-500 text-sm font-medium"><i class="fas fa-arrow-up"></i> 12%</span>
            </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="text-slate-500 text-xs font-bold uppercase mb-1">검수 대기중</div>
            <div class="flex items-end justify-between">
                <span class="text-3xl font-bold text-orange-500">0건</span>
                <span class="text-slate-400 text-sm">처리 필요</span>
            </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="text-slate-500 text-xs font-bold uppercase mb-1">총 참여자 수 (실시간)</div>
            <div class="flex items-end justify-between">
                <span class="text-3xl font-bold text-indigo-600">0명</span>
                <span class="text-green-500 text-sm font-medium">+0명</span>
            </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="text-slate-500 text-xs font-bold uppercase mb-1">이번 달 지급 리워드</div>
            <div class="flex items-end justify-between">
                <span class="text-3xl font-bold text-slate-800">₩0M</span>
                <span class="text-xs text-slate-400">예산 대비 0%</span>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-6">
        <div class="col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <h3 class="font-bold text-slate-700 mb-4">최근 등록된 설문</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b">
                    <tr>
                        <th class="px-4 py-3">설문 제목</th>
                        <th class="px-4 py-3">작성자</th>
                        <th class="px-4 py-3">상태</th>
                        <th class="px-4 py-3">목표/현재</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                    <tr>
                        <td class="px-4 py-3 font-medium">20대 여성 화장품 선호도 조사</td>
                        <td class="px-4 py-3">박마케터</td>
                        <td class="px-4 py-3"><span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs font-bold">진행중</span></td>
                        <td class="px-4 py-3">100 / 45</td>
                    </tr>
                    <tr>
                        <td class="px-4 py-3 font-medium">신규 서비스 UX 사용성 테스트</td>
                        <td class="px-4 py-3">최기획</td>
                        <td class="px-4 py-3"><span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-xs font-bold">작성중</span></td>
                        <td class="px-4 py-3">50 / 0</td>
                    </tr>
                    <tr>
                        <td class="px-4 py-3 font-medium">반려동물 간식 구매 패턴</td>
                        <td class="px-4 py-3">이창업</td>
                        <td class="px-4 py-3"><span class="bg-orange-100 text-orange-700 px-2 py-0.5 rounded text-xs font-bold">검수대기</span></td>
                        <td class="px-4 py-3">200 / 0</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <h3 class="font-bold text-slate-700 mb-4">시스템 알림</h3>
            <ul class="space-y-4">
                <li class="flex gap-3">
                    <div class="mt-1 text-red-500"><i class="fas fa-exclamation-circle"></i></div>
                    <div>
                        <p class="text-sm font-medium text-slate-800">리워드 예산 경고</p>
                        <p class="text-xs text-slate-500">월 예산의 80%가 소진되었습니다.</p>
                    </div>
                </li>
                <li class="flex gap-3">
                    <div class="mt-1 text-blue-500"><i class="fas fa-info-circle"></i></div>
                    <div>
                        <p class="text-sm font-medium text-slate-800">서버 점검 예정</p>
                        <p class="text-xs text-slate-500">내일 새벽 02:00 ~ 04:00</p>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</div>
</html>
