<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!-- Promotion Page Content Fragment -->
<div th:fragment="content" id="page-promotion" class="page-section hidden flex-1 overflow-y-auto p-8 space-y-6">

    <!-- Sub-tab Navigation -->
    <div class="border-b border-slate-200">
        <nav class="flex gap-1" id="promotion-tabs">
            <button onclick="switchPromotionTab('discount')"
                    id="tab-discount"
                    class="promotion-tab px-5 py-2.5 text-sm font-medium border-b-2 border-indigo-600 text-indigo-600 -mb-px transition-colors">
                할인 코드 관리
            </button>
            <button onclick="switchPromotionTab('reward')"
                    id="tab-reward"
                    class="promotion-tab px-5 py-2.5 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 -mb-px transition-colors">
                리워드 지급 내역
            </button>
        </nav>
    </div>

    <!-- ===== Discount Code Tab ===== -->
    <div id="promo-section-discount" class="space-y-6">

        <!-- Create Form -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <h3 class="font-bold text-slate-700 mb-4">할인 코드 생성</h3>
            <div class="flex flex-wrap gap-4 items-end">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-slate-500">학회/기관명 <span class="text-red-500">*</span></label>
                    <input type="text" id="discount-org-name" placeholder="예: 한국컴퓨터학회"
                           class="border border-slate-300 rounded-lg px-3 py-2 text-sm w-56 focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-slate-500">만료일 <span class="text-red-500">*</span></label>
                    <input type="date" id="discount-expired-at"
                           class="border border-slate-300 rounded-lg px-3 py-2 text-sm w-44 focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
                </div>
                <button onclick="createDiscountCode()"
                        id="discount-create-btn"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors flex items-center gap-2">
                    <i class="fas fa-plus text-xs"></i>
                    코드 생성
                </button>
            </div>
            <div id="discount-create-error" class="hidden mt-3 text-xs text-red-500"></div>
        </div>

        <!-- Code List -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-slate-700">할인 코드 목록</h3>
                <button onclick="loadDiscountCodes()"
                        class="text-xs text-indigo-600 hover:text-indigo-800 flex items-center gap-1 transition-colors">
                    <i class="fas fa-rotate-right text-xs"></i>
                    새로고침
                </button>
            </div>

            <!-- Loading -->
            <div id="discount-loading" class="py-10 flex justify-center text-slate-400 text-sm">
                <i class="fas fa-spinner fa-spin mr-2"></i> 불러오는 중...
            </div>

            <!-- Empty -->
            <div id="discount-empty" class="hidden py-10 text-center text-slate-400 text-sm">
                <i class="fas fa-ticket-slash text-2xl mb-2 block"></i>
                등록된 할인 코드가 없습니다.
            </div>

            <!-- Table -->
            <div id="discount-table-wrapper" class="hidden overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-slate-500 bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-4 py-3 font-medium">ID</th>
                        <th class="px-4 py-3 font-medium">학회/기관명</th>
                        <th class="px-4 py-3 font-medium">할인 코드</th>
                        <th class="px-4 py-3 font-medium">만료일</th>
                        <th class="px-4 py-3 font-medium">생성일</th>
                        <th class="px-4 py-3 font-medium">상태</th>
                    </tr>
                    </thead>
                    <tbody id="discount-table-body" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ===== Reward Tab ===== -->
    <div id="promo-section-reward" class="hidden grid grid-cols-3 gap-6">
        <div class="bg-indigo-900 text-white p-6 rounded-xl shadow-md">
            <div class="text-indigo-200 text-xs font-bold uppercase mb-1">지급 대기 포인트</div>
            <div class="text-3xl font-bold">125,000 P</div>
            <div class="mt-4 text-sm text-indigo-200">자동 지급 실패: <span class="text-white font-bold">2건</span></div>
        </div>

        <div class="col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-slate-700">실시간 지급 내역</h3>
                <button class="text-xs text-indigo-600 hover:underline">전체보기</button>
            </div>
            <table class="w-full text-sm text-left">
                <thead class="text-xs text-slate-500 bg-slate-50 border-b">
                <tr>
                    <th class="px-3 py-2">시간</th>
                    <th class="px-3 py-2">사용자</th>
                    <th class="px-3 py-2">설문 ID</th>
                    <th class="px-3 py-2">금액</th>
                    <th class="px-3 py-2">상태</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr>
                    <td class="px-3 py-2 text-slate-500">14:22</td>
                    <td class="px-3 py-2">user_882</td>
                    <td class="px-3 py-2">#SV-01</td>
                    <td class="px-3 py-2 font-bold text-indigo-600">+500P</td>
                    <td class="px-3 py-2"><span class="text-green-600 text-xs font-bold">성공</span></td>
                </tr>
                <tr>
                    <td class="px-3 py-2 text-slate-500">14:20</td>
                    <td class="px-3 py-2">user_102</td>
                    <td class="px-3 py-2">#SV-01</td>
                    <td class="px-3 py-2 font-bold text-indigo-600">+500P</td>
                    <td class="px-3 py-2"><span class="text-red-500 text-xs font-bold">실패</span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>


<script>
    // ── Promotion Tab 전환 ──────────────────────────────────────────────
    function switchPromotionTab(tab) {
        document.querySelectorAll('.promotion-tab').forEach(btn => {
            btn.classList.remove('border-indigo-600', 'text-indigo-600');
            btn.classList.add('border-transparent', 'text-slate-500');
        });
        document.getElementById('tab-' + tab).classList.remove('border-transparent', 'text-slate-500');
        document.getElementById('tab-' + tab).classList.add('border-indigo-600', 'text-indigo-600');

        document.querySelectorAll('[id^="promo-section-"]').forEach(el => el.classList.add('hidden'));
        document.getElementById('promo-section-' + tab).classList.remove('hidden');
    }

    // ── 할인 코드 목록 조회 ─────────────────────────────────────────────
    async function loadDiscountCodes() {
        document.getElementById('discount-loading').classList.remove('hidden');
        document.getElementById('discount-empty').classList.add('hidden');
        document.getElementById('discount-table-wrapper').classList.add('hidden');

        try {
            const list = await apiCall('/discount-codes') || [];

            document.getElementById('discount-loading').classList.add('hidden');

            if (list.length === 0) {
                document.getElementById('discount-empty').classList.remove('hidden');
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const tbody = document.getElementById('discount-table-body');
            tbody.innerHTML = list.map(item => {
                const expired = new Date(item.expiredAt) < today;
                const statusBadge = expired
                    ? '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-500">만료됨</span>'
                    : '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-700">활성</span>';

                const createdDate = new Date(item.createdAt).toLocaleDateString('ko-KR', {
                    year: 'numeric', month: '2-digit', day: '2-digit'
                });

                return `<tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-4 py-3 text-slate-400 text-xs">${item.id}</td>
                    <td class="px-4 py-3 font-medium text-slate-700">${escapeHtml(item.organizationName)}</td>
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <span class="font-mono font-bold text-indigo-600 tracking-widest text-base">${escapeHtml(item.code)}</span>
                            <button onclick="copyCode('${escapeHtml(item.code)}')"
                                    title="복사"
                                    class="text-slate-400 hover:text-indigo-600 transition-colors text-xs">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </td>
                    <td class="px-4 py-3 text-slate-600">${item.expiredAt}</td>
                    <td class="px-4 py-3 text-slate-400 text-xs">${createdDate}</td>
                    <td class="px-4 py-3">${statusBadge}</td>
                </tr>`;
            }).join('');

            document.getElementById('discount-table-wrapper').classList.remove('hidden');
        } catch (e) {
            document.getElementById('discount-loading').classList.add('hidden');
            document.getElementById('discount-empty').classList.remove('hidden');
            showToast('할인 코드 목록을 불러오지 못했습니다.', 'error');
        }
    }

    // ── 할인 코드 생성 ──────────────────────────────────────────────────
    async function createDiscountCode() {
        const orgName = document.getElementById('discount-org-name').value.trim();
        const expiredAt = document.getElementById('discount-expired-at').value;
        const errEl = document.getElementById('discount-create-error');
        const btn = document.getElementById('discount-create-btn');

        errEl.classList.add('hidden');

        if (!orgName) {
            errEl.textContent = '학회/기관명을 입력해 주세요.';
            errEl.classList.remove('hidden');
            return;
        }
        if (!expiredAt) {
            errEl.textContent = '만료일을 선택해 주세요.';
            errEl.classList.remove('hidden');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin text-xs"></i> 생성 중...';

        try {
            await apiCall('/discount-codes', 'POST', { organizationName: orgName, expiredAt: expiredAt });

            document.getElementById('discount-org-name').value = '';
            document.getElementById('discount-expired-at').value = '';
            showToast('할인 코드가 생성되었습니다.', 'success');
            await loadDiscountCodes();
        } catch (e) {
            const msg = e?.message || '할인 코드 생성에 실패했습니다.';
            errEl.textContent = msg;
            errEl.classList.remove('hidden');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-plus text-xs"></i> 코드 생성';
        }
    }

    // ── 코드 클립보드 복사 ──────────────────────────────────────────────
    function copyCode(code) {
        navigator.clipboard.writeText(code).then(() => {
            showToast(`코드 "${code}" 복사됨`, 'success');
        });
    }

    // ── XSS 방지 ────────────────────────────────────────────────────────
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ── 프로모션 페이지 진입 시 자동 로드 ──────────────────────────────
    // navigation.js의 showPage 호출 후 실행되도록 MutationObserver 활용
    (function() {
        const promoPage = document.getElementById('page-promotion');
        if (!promoPage) return;
        let loaded = false;
        const observer = new MutationObserver(() => {
            if (!promoPage.classList.contains('hidden') && !loaded) {
                loaded = true;
                loadDiscountCodes();
            }
            if (promoPage.classList.contains('hidden')) {
                loaded = false; // 다시 진입 시 재로드
            }
        });
        observer.observe(promoPage, { attributes: true, attributeFilter: ['class'] });
    })();
</script>
</div>
</html>
