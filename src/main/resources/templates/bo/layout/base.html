<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - Admin OS' : '설문 플랫폼 통합 백오피스'}">Admin OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/bo/bo-session.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/bo/styles/common.css}">
</head>
<body class="bg-slate-100 h-screen overflow-hidden flex">

    <!-- Sidebar -->
    <th:block th:replace="~{bo/fragments/sidebar :: sidebar(activePage=${activePage}, adminName=${adminName})}"></th:block>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <!-- Header -->
        <th:block th:replace="~{bo/fragments/header :: header(pageTitle=${pageTitle})}"></th:block>

        <!-- Page Content -->
        <div class="flex-1 flex flex-col overflow-hidden bg-slate-100">
            <th:block th:replace="${content}"></th:block>
        </div>
    </main>

    <!-- Common Scripts -->
    <th:block th:replace="~{bo/fragments/scripts :: scripts}"></th:block>
</body>
</html>
